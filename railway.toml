[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node -e \"const fs=require('node:fs');const path=require('node:path');const cp=require('node:child_process');const cwd=fs.existsSync('server/scripts/goofish-pipeline.js')?'server':'.';const script='scripts/goofish-pipeline.js';const npm=process.platform==='win32'?'npm.cmd':'npm';const run=(cmd,args,opts={})=>cp.spawnSync(cmd,args,{cwd,stdio:'inherit',...opts});const i=run(npm,['install']);if(i.status!==0)process.exit(i.status||1);const candidates=[process.env.PUPPETEER_EXECUTABLE_PATH,process.env.GOOFISH_CHROME_PATH,process.env.CHROME_PATH,'/usr/bin/google-chrome-stable','/usr/bin/google-chrome','/opt/google/chrome/chrome','/usr/bin/chromium-browser','/usr/bin/chromium','/snap/bin/chromium'].filter(Boolean);let executablePath=candidates.find((p)=>{try{return fs.existsSync(p);}catch{return false;}});if(!executablePath){const b=cp.spawnSync('npx',['-y','@puppeteer/browsers','install','chrome@stable','--path','.cache/puppeteer'],{cwd,stdio:'inherit'});if(b.status!==0)process.exit(b.status||1);const root=path.join(cwd,'.cache','puppeteer');const walk=(dir)=>{let out=[];for(const e of fs.readdirSync(dir,{withFileTypes:true})){const p=path.join(dir,e.name);if(e.isDirectory())out=out.concat(walk(p));else out.push(p);}return out;};try{const files=walk(root);executablePath=files.find((p)=>/chrome(\\.exe)?$/.test(p)&&p.includes('chrome-linux'));}catch{}}const env={...process.env,ALLOW_SCRAPER_IN_PROD:'true'};if(executablePath)env.PUPPETEER_EXECUTABLE_PATH=executablePath;const r=cp.spawnSync(process.execPath,[script],{cwd,stdio:'inherit',env});process.exit(r.status||0);\""
