[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node -e \"const fs=require('node:fs');const path=fs.existsSync('server/scripts/goofish-pipeline.js')?'server/scripts/goofish-pipeline.js':'scripts/goofish-pipeline.js';require('node:child_process').spawnSync(process.execPath,[path],{stdio:'inherit'});\""
