[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node -e \"const fs=require('node:fs');const cp=require('node:child_process');const cwd=fs.existsSync('server/scripts/goofish-pipeline.js')?'server':'.';const script='scripts/goofish-pipeline.js';const npm=process.platform==='win32'?'npm.cmd':'npm';console.log('[boot] cwd=',cwd);console.log('[boot] script=',script);console.log('[boot] installing dependencies...');const i=cp.spawnSync(npm,['install'],{cwd,stdio:'inherit'});if(i.error){console.error('[boot] npm install spawn error:',i.error.message||i.error);process.exit(1);}console.log('[boot] npm install exit=',i.status);if(i.status!==0)process.exit(i.status||1);const env={...process.env,ALLOW_SCRAPER_IN_PROD:'true'};console.log('[boot] launching goofish pipeline...');const r=cp.spawnSync(process.execPath,[script],{cwd,stdio:'inherit',env});if(r.error){console.error('[boot] node spawn error:',r.error.message||r.error);process.exit(1);}console.log('[boot] pipeline exit=',r.status);process.exit(r.status||0);\""
