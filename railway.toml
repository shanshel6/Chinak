[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node -e \"const fs=require('node:fs');const cp=require('node:child_process');const cwd=fs.existsSync('server/scripts/goofish-pipeline.js')?'server':'.';const script='scripts/goofish-pipeline.js';const npm=process.platform==='win32'?'npm.cmd':'npm';const run=(cmd,args,opts={})=>cp.spawnSync(cmd,args,{stdio:'inherit',...opts});if(process.platform==='linux'&&fs.existsSync('/usr/bin/apt-get')){const needsChrome=!fs.existsSync('/usr/bin/chromium')&&!fs.existsSync('/usr/bin/chromium-browser')&&!fs.existsSync('/usr/bin/google-chrome')&&!fs.existsSync('/usr/bin/google-chrome-stable');const needsLib=!fs.existsSync('/usr/lib/x86_64-linux-gnu/libnspr4.so');if(needsChrome||needsLib){console.log('[boot] installing system chromium deps...');run('apt-get',['update']);const a=run('apt-get',['install','-y','--no-install-recommends','chromium','libnspr4','libnss3','libatk1.0-0','libatk-bridge2.0-0','libcups2','libdrm2','libxkbcommon0','libxcomposite1','libxdamage1','libxfixes3','libxrandr2','libgbm1','libasound2','libpangocairo-1.0-0','libpango-1.0-0','libcairo2','libatspi2.0-0','libx11-6','libx11-xcb1','libxcb1','libxext6','libxrender1','libxss1','libgtk-3-0','libdbus-1-3','ca-certificates','fonts-liberation']);console.log('[boot] apt install exit=',a.status);}}console.log('[boot] cwd=',cwd);console.log('[boot] script=',script);console.log('[boot] installing dependencies...');const i=cp.spawnSync(npm,['install'],{cwd,stdio:'inherit'});if(i.error){console.error('[boot] npm install spawn error:',i.error.message||i.error);process.exit(1);}console.log('[boot] npm install exit=',i.status);if(i.status!==0)process.exit(i.status||1);const env={...process.env,ALLOW_SCRAPER_IN_PROD:'true'};const chromeCandidates=['/usr/bin/chromium','/usr/bin/chromium-browser','/usr/bin/google-chrome-stable','/usr/bin/google-chrome'];const chromePath=chromeCandidates.find((p)=>fs.existsSync(p));if(chromePath){env.PUPPETEER_EXECUTABLE_PATH=chromePath;console.log('[boot] using chrome path=',chromePath);}console.log('[boot] launching goofish pipeline...');const r=cp.spawnSync(process.execPath,[script],{cwd,stdio:'inherit',env});if(r.error){console.error('[boot] node spawn error:',r.error.message||r.error);process.exit(1);}console.log('[boot] pipeline exit=',r.status);process.exit(r.status||0);\""
