<!doctype html>
<html class="light" dir="rtl" lang="ar">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>DFC - Direct From China</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;900&family=Inter:wght@400;500;700&display=block" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@latest/css/materialdesignicons.min.css" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <div class="initial-loader">
        <div class="loader-logo">
          <div class="loader-spinner"></div>
          <img src="logo.png" alt="DFC" style="width: 48px; height: 48px; object-fit: contain;" onerror="this.style.display='none'; this.parentElement.innerHTML += '<span style=\'color: #2563eb; font-weight: bold; font-size: 2rem;\'>D</span>'">
        </div>
        <div class="loader-text">DFC</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
