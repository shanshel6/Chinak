workflows:
  ios-release:
    name: iOS Release CODEMAGIC_MANAGED_SIGNING_V1
    instance_type: mac_mini_m1
    max_build_duration: 60
    integrations:
      app_store_connect: DFC
    environment:
      xcode: latest
      groups:
        - app_store_credentials
      ios_signing:
        certificates:
          - $CM_CERTIFICATE_REFERENCE
        provisioning_profiles:
          - $CM_PROFILE_REFERENCE
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.chinak.app"
        APPLE_APP_ID: "6760597610"
        DEVELOPMENT_TEAM: "3GF82YPKY5"
        TEST_DEVICE_UDID: "00008150-001C5C4C36D9401C"
        TEST_DEVICE_NAME: "Chinak iPhone"
    triggering:
      events:
        - push
      cancel_previous_builds: true
      branch_patterns:
        - pattern: main
          include: true
    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules
        - $HOME/.npm
        - $CM_BUILD_DIR/ios/Pods
    scripts:
      - name: Install npm dependencies
        script: |
          npm install --no-audit
      - name: Build web assets and sync Capacitor
        script: |
          npm run build:ios
      - name: Set unique iOS build number
        script: |
          BUILD_NUMBER="$(date +%s)"
          cd ios/App
          xcrun agvtool new-version -all "$BUILD_NUMBER" || true
          cd ../..
          perl -0777 -i -pe "s/CURRENT_PROJECT_VERSION = \d+;/CURRENT_PROJECT_VERSION = $BUILD_NUMBER;/g" ios/App/App.xcodeproj/project.pbxproj
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/App/App/Info.plist
          echo "CURRENT_PROJECT_VERSION in project:"
          grep "CURRENT_PROJECT_VERSION =" ios/App/App.xcodeproj/project.pbxproj
          echo "CFBundleVersion set to:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" ios/App/App/Info.plist
      - name: Initialize Keychain
        script: |
          keychain initialize
      - name: Add certificates to keychain (CODEMAGIC_MANAGED_SIGNING_V1)
        script: |
          keychain add-certificates
      - name: Set up code signing settings on Xcode project (CODEMAGIC_MANAGED_SIGNING_V1)
        script: |
          echo "CODEMAGIC_MANAGED_SIGNING_V1"
          xcode-project use-profiles
          
      - name: Build IPA for distribution (CODEMAGIC_MANAGED_SIGNING_V1)
        script: |
          xcode-project build-ipa --project "$XCODE_PROJECT" --scheme "$XCODE_SCHEME" --config Release
      - name: Upload IPA to App Store Connect
        script: |
          set -euo pipefail

          IPA_PATH="$(find "$CM_BUILD_DIR/build/ios/ipa" -maxdepth 1 -name "*.ipa" | head -n 1)"
          if [ -z "${IPA_PATH:-}" ]; then
            echo "IPA file not found in $CM_BUILD_DIR/build/ios/ipa"
            exit 1
          fi

          PRIVATE_KEY_VALUE="${APP_STORE_CONNECT_PRIVATE_KEY:-${APP_STORE_CONNECT_PUBLISHER_PRIVATE_KEY:-}}"
          if [ -z "${PRIVATE_KEY_VALUE:-}" ]; then
            echo "App Store Connect private key env var is missing"
            exit 1
          fi

          mkdir -p "$HOME/.appstoreconnect/private_keys"
          KEY_FILE="$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          printf '%s' "$PRIVATE_KEY_VALUE" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          BUILD_NUMBER="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' ios/App/App/Info.plist)"
          VERSION_NAME="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' ios/App/App/Info.plist 2>/dev/null || true)"
          if [ -z "${VERSION_NAME:-}" ] || [ "$VERSION_NAME" = '$(MARKETING_VERSION)' ]; then
            VERSION_NAME="$(sed -n 's/.*MARKETING_VERSION = \(.*\);/\1/p' ios/App/App.xcodeproj/project.pbxproj | head -n 1)"
          fi

          echo "Uploading $IPA_PATH to App Store Connect for Apple ID $APPLE_APP_ID"
          xcrun altool --upload-package "$IPA_PATH" \
            --type ios \
            --apple-id "$APPLE_APP_ID" \
            --bundle-id "$BUNDLE_ID" \
            --bundle-version "$BUILD_NUMBER" \
            --bundle-short-version-string "$VERSION_NAME" \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
            
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - "*.dSYM.zip"
