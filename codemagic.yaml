workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      xcode: latest
      groups:
        - app_store_credentials # Must match the group name in Codemagic UI
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.chinak.app"
        DEVELOPMENT_TEAM: "3GF82YPKY5" # Your Apple Team ID
        TEST_DEVICE_UDID: "00008150-001C5C4C36D9401C"
        TEST_DEVICE_NAME: "Chinak iPhone"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web assets and sync Capacitor
        script: |
          npm run build:ios
      - name: Initialize Keychain
        script: |
          keychain initialize
      - name: Set up code signing settings on Xcode project
        script: |
          # Clean derived data to remove stale signing info
          rm -rf ~/Library/Developer/Xcode/DerivedData
          
          # STRATEGY CHANGE: Manual Signing with "xcode-project use-profiles"
          # Since Automatic Signing is persistently failing with "Communication with Apple failed: Your team has no devices",
          # even though we registered one, we will switch to MANUAL signing.
          
          # 1. Fetch Signing Files (Certificate & Profile)
          # We explicitly fetch the Development Certificate and a matching Provisioning Profile.
          # We use --create to ensure they exist.
          
          echo "Fetching Signing Files..."
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_DEVELOPMENT \
            --create \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"
            
          # 2. Add to Keychain
          keychain add-certificates
          
          # 3. Apply Profiles to Xcode Project
          # This command modifies the project file to use Manual signing and sets the profile UUIDs.
          # This bypasses xcodebuild trying to talk to Apple during the build.
          echo "Applying profiles to Xcode project..."
          xcode-project use-profiles
          
      - name: Build IPA for distribution
        script: |
          # Reverting to 'xcode-project build-ipa' which is robust for Manual Signing
          # It automatically detects the profile we just applied with 'use-profiles'.
          
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release
            
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - "*.dSYM.zip"
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
