workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      xcode: latest
      groups:
        - app_store_credentials # Must match the group name in Codemagic UI
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.chinak.app"
        DEVELOPMENT_TEAM: "3GF82YPKY5" # Your Apple Team ID
        TEST_DEVICE_UDID: "00008150-001C5C4C36D9401C"
        TEST_DEVICE_NAME: "Chinak iPhone"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web assets and sync Capacitor
        script: |
          npm run build:ios
      - name: Initialize Keychain
        script: |
          keychain initialize
      - name: Set up code signing settings on Xcode project
        script: |
          # 1. Clean DerivedData
          rm -rf ~/Library/Developer/Xcode/DerivedData
          
          # 2. Try to delete existing "Apple Development" certificates from the default keychain
          security delete-certificate -c "Apple Development" || echo "No existing Apple Development certs found or deletion failed"
          
          # 3. Fetch Signing Files (Certificate & Profile)
          echo "Fetching Signing Files..."
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_DEVELOPMENT \
            --create \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"
            
          # 4. Add to Keychain
          keychain add-certificates
          
          # 5. Apply Profiles to Xcode Project (Manual Method)
          # 'xcode-project use-profiles' is seemingly failing to apply the profile correctly.
          # We will force-inject the Provisioning Profile UUID into the project.pbxproj file using sed.
          
          echo "Listing Provisioning Profiles:"
          ls -l ~/Library/MobileDevice/Provisioning\ Profiles/
          
          # Find the first .mobileprovision file
          PROFILE_PATH=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" | head -n 1)
          if [ -z "$PROFILE_PATH" ]; then
            echo "ERROR: No provisioning profile found!"
            exit 1
          fi
          
          # Extract UUID and Name from the profile
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i "$PROFILE_PATH"))
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< $(security cms -D -i "$PROFILE_PATH"))
          echo "Found Profile UUID: $PROFILE_UUID"
          echo "Found Profile Name: $PROFILE_NAME"
          
          # Use sed to update project.pbxproj
          # We look for the 'App' target configuration section and inject the PROVISIONING_PROFILE_SPECIFIER
          # Note: This is a bit brittle, but 'xcode-project' wrapper seems to be failing us.
          
          PROJECT_FILE="$XCODE_PROJECT/project.pbxproj"
          
          # Disable Automatic Signing
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' "$PROJECT_FILE"
          
          # Set Development Team
          sed -i '' "s/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = $DEVELOPMENT_TEAM;/g" "$PROJECT_FILE"
          
          # Set Provisioning Profile Specifier (UUID) for Release configuration
          # We'll just replace it globally or append it if missing. 
          # Simplest hack: Replace any existing specifier or insert it.
          # However, inserting into pbxproj with sed is hard.
          
          # Better approach: Use 'xcode-project use-profiles' but verifying why it failed.
          # It might be because the target name 'App' matches multiple things or it's confused.
          
          echo "Running xcode-project use-profiles..."
          xcode-project use-profiles --project "$XCODE_PROJECT"
          
          # FORCE VERIFICATION: If grep fails, we fail the build here to know immediately
          if grep -q "$PROFILE_UUID" "$PROJECT_FILE"; then
             echo "SUCCESS: Profile UUID found in project file."
          else
             echo "ERROR: Profile UUID NOT found in project file. 'xcode-project' failed."
             echo "Attempting crude sed injection..."
             # Replace "CODE_SIGN_STYLE = Manual;" with "CODE_SIGN_STYLE = Manual; PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_UUID\";"
             sed -i '' "s/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Manual; PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_UUID\";/g" "$PROJECT_FILE"
             
             # Also explicit PROVISIONING_PROFILE key
             sed -i '' "s/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Manual; PROVISIONING_PROFILE = \"$PROFILE_UUID\";/g" "$PROJECT_FILE"
          fi
          
      - name: Build IPA for distribution
        script: |
          # Reverting to 'xcode-project build-ipa' which is robust for Manual Signing
          
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release
            
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - "*.dSYM.zip"
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
