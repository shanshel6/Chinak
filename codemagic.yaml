workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      xcode: latest
      groups:
        - app_store_credentials # Must match the group name in Codemagic UI
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.chinak.app"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web assets and sync Capacitor
        script: |
          npm run build:ios
      - name: Initialize Keychain
        script: |
          keychain initialize
      - name: Set up code signing settings on Xcode project
        script: |
          # SIMPLIFIED STRATEGY: Rely purely on Xcode Automatic Signing
          # We authenticate with the API Key, and Xcode will download/create what it needs.
          
          # 1. Create a directory for authentication
          mkdir -p ~/private_keys
          
          # 2. Write the API Key to a file that Xcode can find
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_IDENTIFIER.p8
          
          # 3. Create ExportOptions.plist
          # This is required for xcodebuild -exportArchive when using automatic signing
          cat > "$CM_BUILD_DIR/export_options.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$APP_STORE_CONNECT_ISSUER_ID</string>
              <key>destination</key>
              <string>export</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF
          
          echo "Skipping manual certificate fetch. Relying on Xcode Automatic Signing."
          
      - name: Build IPA for distribution
        script: |
          # We need to pass the authentication details to xcodebuild.
          # Since we can't easily pass the key file path to standard xcodebuild without a custom plist,
          # we will try the Codemagic way one last time but WITHOUT 'keychain add-certificates'.
          
          # Alternative: Use 'xcode-project build-ipa' which wraps xcodebuild.
          # We add -authenticationKeyID, -authenticationKeyIssuerID, etc. if supported,
          # OR we rely on the environment variables being present.
          
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release \
            --archive-xcargs "ALLOW_PROVISIONING_UPDATES=YES CODE_SIGN_STYLE=Automatic DEVELOPMENT_TEAM=$APP_STORE_CONNECT_ISSUER_ID" \
            --export-options-plist "$CM_BUILD_DIR/export_options.plist"
            
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - "*.dSYM.zip"
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
