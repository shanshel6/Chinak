workflows:
  ios-release:
    name: iOS Release CODEMAGIC_MANAGED_SIGNING_V1
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      xcode: latest
      groups:
        - app_store_credentials
      ios_signing:
        certificates:
          - $CM_CERTIFICATE_REFERENCE
        provisioning_profiles:
          - $CM_PROFILE_REFERENCE
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.chinak.app"
        DEVELOPMENT_TEAM: "3GF82YPKY5"
        TEST_DEVICE_UDID: "00008150-001C5C4C36D9401C"
        TEST_DEVICE_NAME: "Chinak iPhone"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web assets and sync Capacitor
        script: |
          npm run build:ios
      - name: Initialize Keychain
        script: |
          keychain initialize
      - name: Set up code signing settings on Xcode project (CODEMAGIC_MANAGED_SIGNING_V1)
        script: |
          echo "CODEMAGIC_MANAGED_SIGNING_V1"
          xcode-project use-profiles
          
      - name: Build IPA for distribution (CODEMAGIC_MANAGED_SIGNING_V1)
        script: |
          xcode-project build-ipa \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -config Release
            
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - "*.dSYM.zip"
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
