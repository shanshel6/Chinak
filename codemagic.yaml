workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      xcode: latest
      groups:
        - app_store_credentials # Must match the group name in Codemagic UI
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.chinak.app"
        DEVELOPMENT_TEAM: "3GF82YPKY5" # Your Apple Team ID
        TEST_DEVICE_UDID: "00008150-001C5C4C36D9401C"
        TEST_DEVICE_NAME: "Chinak iPhone"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web assets and sync Capacitor
        script: |
          npm run build:ios
      - name: Initialize Keychain
        script: |
          keychain initialize
      - name: Set up code signing settings on Xcode project
        script: |
          # 1. Clean DerivedData
          rm -rf ~/Library/Developer/Xcode/DerivedData
          
          # 2. Try to delete existing "Apple Development" certificates from the default keychain
          security delete-certificate -c "Apple Development" || echo "No existing Apple Development certs found or deletion failed"
          
          # 3. Fetch Signing Files (Certificate & Profile)
          echo "Fetching Signing Files..."
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_DEVELOPMENT \
            --create \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"
            
          # 4. Add to Keychain
          keychain add-certificates
          
          # 5. Apply Profiles to Xcode Project (Manual Method)
          # 'xcode-project use-profiles' is failing to update the project file correctly for some reason.
          # We will do it the hard way: Find the profile UUID and manually sed the project file.
          
          echo "Listing Provisioning Profiles:"
          ls -l ~/Library/MobileDevice/Provisioning\ Profiles/
          
          # Find the first .mobileprovision file
          PROFILE_PATH=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" | head -n 1)
          if [ -z "$PROFILE_PATH" ]; then
            echo "ERROR: No provisioning profile found!"
            exit 1
          fi
          
          # Extract UUID from the profile
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i "$PROFILE_PATH"))
          echo "Found Profile UUID: $PROFILE_UUID"
          
          # Manually update project.pbxproj to use this profile
          # This is risky but necessary if 'xcode-project' is failing.
          # We search for the target 'App' and update its attributes.
          # Actually, 'xcode-project use-profiles' DOES exactly this.
          # If it fails, it means the target name or bundle ID might be mismatching what's in the profile.
          
          # Let's try 'xcode-project use-profiles' ONE MORE TIME but with debug info.
          echo "Running xcode-project use-profiles..."
          xcode-project use-profiles --project "$XCODE_PROJECT"
          
          # 6. Verify if it worked by grepping the project file
          echo "Checking project.pbxproj for profile UUID..."
          grep "$PROFILE_UUID" "$XCODE_PROJECT/project.pbxproj" || echo "WARNING: Profile UUID not found in project file!"
          
      - name: Build IPA for distribution
        script: |
          # Reverting to 'xcode-project build-ipa' which is robust for Manual Signing
          
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release
            
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - "*.dSYM.zip"
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
