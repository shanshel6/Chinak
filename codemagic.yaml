workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      xcode: latest
      groups:
        - app_store_credentials # Must match the group name in Codemagic UI
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.chinak.app"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web assets and sync Capacitor
        script: |
          npm run build:ios
      - name: Initialize Keychain
        script: |
          keychain initialize
      - name: Set up code signing settings on Xcode project
        script: |
          # Fetch signing files from App Store Connect
          # We pass credentials explicitly just to be safe.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"
            
          # Apply profiles to Xcode project
          # Note: keychain add-certificates typically does not take --certificate-key argument
          # It assumes the certificate file itself is present or passed as argument.
          # However, app-store-connect fetch-signing-files downloads certs to a default location.
          # We need to tell keychain add-certificates where to look or rely on default behavior.
          # But the error "Cannot save Signing Certificates without certificate private key"
          # suggests we might need to manually import the private key if it's not in the p12.
          
          # Usually, 'keychain add-certificates' automatically picks up files downloaded by 'fetch-signing-files'.
          # Let's try the default invocation again, but ensure we aren't passing invalid flags.
          keychain add-certificates
          
          # If that fails, we might need to manually add the private key to the keychain.
          # The API Key is NOT the signing key. The signing key (p12) comes from Apple.
          # If 'fetch-signing-files' created a new cert, it might not have the private key locally
          # unless we provided one or it generated a CSR.
          
          # However, for cloud signing with API Key, we usually rely on Codemagic to handle this.
          # Let's try simplifying to just 'keychain add-certificates' which is the standard command.
          # The previous error "unrecognized arguments: --certificate-key" confirms the flag was wrong.
            
      - name: Build IPA for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release \
            --archive-xcargs "ALLOW_PROVISIONING_UPDATES=YES CODE_SIGN_STYLE=Automatic"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - "*.dSYM.zip"
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
