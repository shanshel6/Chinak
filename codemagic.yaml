workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      xcode: latest
      groups:
        - app_store_credentials # Must match the group name in Codemagic UI
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.chinak.app"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web assets and sync Capacitor
        script: |
          npm run build:ios
      - name: Initialize Keychain
        script: |
          keychain initialize
      - name: Set up code signing settings on Xcode project
        script: |
          # Detect the strangely named variable from logs and alias it
          # The logs showed "APP_STORAPP_STORE_CONNECT_ISSUER_IDE_CONNECT_ISSUER_ID"
          # This looks like a copy-paste error in the Codemagic UI variable name itself!
          
          # Try to find the variable if the standard one is missing
          if [ -z "$APP_STORE_CONNECT_ISSUER_ID" ]; then
             echo "Standard ISSUER_ID variable not found, looking for misnamed one..."
             # We can't easily guess the typo, but based on the logs:
             # APP_STORAPP_STORE_CONNECT_ISSUER_IDE_CONNECT_ISSUER_ID
             
             # Fallback: Check if user pasted the key content into the variable name?
             # Or if the variable name in UI is corrupted.
             
             # But wait, looking at the logs:
             # "APP_STORAPP_STORE_CONNECT_ISSUER_IDE_CONNECT_ISSUER_ID" appeared in the output list.
             # This suggests the variable NAME in Codemagic UI is literally:
             # "APP_STORAPP_STORE_CONNECT_ISSUER_IDE_CONNECT_ISSUER_ID"
             
             if [ -n "$APP_STORAPP_STORE_CONNECT_ISSUER_IDE_CONNECT_ISSUER_ID" ]; then
                export APP_STORE_CONNECT_ISSUER_ID="$APP_STORAPP_STORE_CONNECT_ISSUER_IDE_CONNECT_ISSUER_ID"
                echo "Recovered ISSUER_ID from misnamed variable."
             fi
          fi

          # Debug: Check specifically for our expected variables
          if [ -z "$APP_STORE_CONNECT_ISSUER_ID" ]; then
            echo "ERROR: APP_STORE_CONNECT_ISSUER_ID is missing or empty!"
            echo "It seems the variable name in Codemagic UI might be corrupted."
            echo "Saw 'APP_STORAPP_STORE_CONNECT_ISSUER_IDE_CONNECT_ISSUER_ID' in env vars."
            echo "Please DELETE the variable in Codemagic UI and re-add it carefully as:"
            echo "APP_STORE_CONNECT_ISSUER_ID"
            exit 1
          fi

          # Fetch signing files from App Store Connect
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"
            
          # Apply profiles to Xcode project
          keychain add-certificates
      - name: Build IPA for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release \
            --archive-xcargs "ALLOW_PROVISIONING_UPDATES=YES CODE_SIGN_STYLE=Automatic"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - "*.dSYM.zip"
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
