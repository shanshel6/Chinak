workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      xcode: latest
      groups:
        - app_store_credentials # Must match the group name in Codemagic UI
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.chinak.app"
        DEVELOPMENT_TEAM: "3GF82YPKY5" # Your Apple Team ID
        TEST_DEVICE_UDID: "00008150-001C5C4C36D9401C"
        TEST_DEVICE_NAME: "Chinak iPhone"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web assets and sync Capacitor
        script: |
          npm run build:ios
      - name: Initialize Keychain
        script: |
          keychain initialize
      - name: Set up code signing settings on Xcode project
        script: |
          # SIMPLIFIED STRATEGY: Rely purely on Xcode Automatic Signing
          # We authenticate with the API Key, and Xcode will download/create what it needs.
          
          # 1. Create a directory for authentication
          mkdir -p ~/private_keys
          
          # 2. Write the API Key to a file that Xcode can find
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_IDENTIFIER.p8
          
          # 3. Register the user's device (REQUIRED for Automatic Signing)
          echo "Registering device: $TEST_DEVICE_NAME ($TEST_DEVICE_UDID)"
          app-store-connect devices create \
            --name "$TEST_DEVICE_NAME" \
            --udid "$TEST_DEVICE_UDID" \
            --platform IOS \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" || echo "Device might already exist, continuing..."

          # 4. Create ExportOptions.plist
          # This is required for xcodebuild -exportArchive when using automatic signing
          cat > "$CM_BUILD_DIR/export_options.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$DEVELOPMENT_TEAM</string>
              <key>destination</key>
              <string>export</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF
          
          echo "Device registered. Proceeding with Xcode Automatic Signing."
          
      - name: Build IPA for distribution
        script: |
          # Note: When using -authenticationKeyID, xcodebuild looks for the key file in specific locations.
          AUTH_KEY_PATH=~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_IDENTIFIER.p8
          
          # Clean up any existing certificates that might confuse Xcode
          # The error "Your account already has an Apple Development signing certificate... but its private key is not installed"
          # suggests Xcode sees a cert on the Apple Developer Portal but doesn't have the key for it.
          # Since we are using Automatic Signing with an API Key, we can try to let Xcode "nuke and pave"
          # by revoking certificates if necessary, OR we can explicitly ask it to create a new one.
          
          # Unfortunately, xcodebuild doesn't have a simple flag to "force revoke".
          # However, by not providing any other keychain items and using -allowProvisioningUpdates,
          # Xcode SHOULD try to create a new one if it can't find a matching local one.
          
          # Attempt 1: Just run archive. If it fails with "Revoke certificate", we might need manual intervention
          # or use a specific "manual" provisioning profile strategy.
          
          # BUT, let's try to clear the DerivedData first to ensure no stale state.
          rm -rf ~/Library/Developer/Xcode/DerivedData
          
          # 1. Archive
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath "$AUTH_KEY_PATH" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM"

          # 2. Export IPA
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            -exportOptionsPlist "$CM_BUILD_DIR/export_options.plist" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath "$AUTH_KEY_PATH"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - "*.dSYM.zip"
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
