workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      xcode: latest
      groups:
        - app_store_credentials # Must match the group name in Codemagic UI
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.chinak.app"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web assets and sync Capacitor
        script: |
          npm run build:ios
      - name: Initialize Keychain
        script: |
          keychain initialize
      - name: Set up code signing settings on Xcode project
        script: |
          # Debug: Print all environment variable names (keys only) to check for typos
          echo "Available Environment Variables:"
          printenv | cut -d= -f1 | sort
          
          # Debug: Check specifically for our expected variables
          if [ -z "$APP_STORE_CONNECT_ISSUER_ID" ]; then
            echo "ERROR: APP_STORE_CONNECT_ISSUER_ID is missing or empty!"
            echo "Please check Codemagic UI > Environment variables."
            echo "Ensure the group name is exactly 'app_store_credentials' (no spaces)."
            echo "Ensure the variable name is exactly 'APP_STORE_CONNECT_ISSUER_ID'."
            exit 1
          fi

          # Fetch signing files from App Store Connect
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"
            
          # Apply profiles to Xcode project
          keychain add-certificates
      - name: Build IPA for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release \
            --archive-xcargs "ALLOW_PROVISIONING_UPDATES=YES CODE_SIGN_STYLE=Automatic"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - "*.dSYM.zip"
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
